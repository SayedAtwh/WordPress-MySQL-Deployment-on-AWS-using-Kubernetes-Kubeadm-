apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  namespace: project-namespace
  name: wordpress-pvc
  labels:
    app: wordpress
    tier: frontend
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName:  wordpress-sc
  volumeName: wordpress-pv